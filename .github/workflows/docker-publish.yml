name: Publish Docker image

# Builds the self-hostable image and pushes it to Docker Hub. The image is
# server-agnostic — it ships with NO baked-in Jellyfin URL, so each self-hoster
# enters their own server address at sign-in (see serverUrlStore). Runs on a
# push to main (tags `latest` + the commit sha) and on a version tag (`vX.Y.Z`).
on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build & push to Docker Hub
    runs-on: ubuntu-latest
    # Only runs when the Docker Hub secrets are configured (skips on forks).
    if: ${{ github.repository == 'johnpc/cadence' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: mrorbitman/cadence
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # No VITE_JELLYFIN_URL → a generic image; users pick their server at login.
          build-args: |
            VITE_JELLYFIN_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max
