name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Concurrency: main-push runs and PR runs get SEPARATE groups so a PR run can
# never cancel an in-progress main run. That mattered because the iOS deploy is
# gated on a SUCCESSFUL main CI (workflow_run) — when a single shared group let a
# PR push cancel the main run, main CI showed "cancelled", so the deploy never
# fired. Now:
#   - push to main → group "ci-main", never cancelled (every merged commit is
#     verified end to end, and reaches `success` so iOS Deploy triggers).
#   - a PR → group "ci-pr-<ref>", cancel-in-progress so a new commit on that PR
#     supersedes its own older run.
# Trade-off: a PR run and a main run can briefly overlap on the shared Jellyfin
# (only during a merge), which the suite tolerates (workers:1 + retries keep each
# run gentle); the old strict repo-wide serialization was cancelling main, which
# was the worse failure.
concurrency:
  group: ci-${{ github.event_name == 'push' && 'main' || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Lint, Test, Coverage, CRAP & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: File-length discipline (max 100 lines)
        run: npm run check:lines

      - name: Feature coverage (every .feature maps to an acceptance area)
        run: npm run check:features

      - name: Unit tests with coverage (80% floor)
        run: npm run test:coverage

      - name: CRAP score analysis (threshold 15)
        run: npm run crap

      - name: Build
        run: npm run build

      - name: Bundle size budget
        # Fails if the gzipped entry/vendor/route chunks exceed .size-limit.json
        # — catches silent bundle bloat we control (deps, imports), unlike the
        # tunnel-noisy runtime metrics.
        run: npm run size

      - name: Lighthouse CI (a11y / best-practices / TBT / CLS)
        # Audits the built static shell (dist/, its own server — no Jellyfin
        # needed). GATES accessibility + best-practices (≥0.9) + TBT + CLS; LCP/
        # TTI/perf-score are WARN only (dominated by Ionic bundle parse + the
        # runtime Jellyfin tunnel, so noisy to gate). Report uploads to LHCI's
        # temporary public storage (link in the log).
        run: npm run lhci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  acceptance:
    # One job per feature area, each its own independent check. Splitting isolates
    # a flaky area from the rest. Tests hit the real Jellyfin server (base URL is
    # baked into the build via VITE_JELLYFIN_URL).
    name: Acceptance Tests (${{ matrix.area.name }})
    runs-on: ubuntu-latest
    strategy:
      # Let every area run even if one fails — a lone failure shouldn't cancel the
      # rest and hide which areas are healthy. Each area is its own check.
      fail-fast: false
      # NO parallelism limit — areas run fully in parallel. Concurrency problems
      # are fixed at the source (reliable navigation via Ionic routerLink instead
      # of raw NavLink; robust step waits) rather than by throttling the matrix.
      matrix:
        area:
          - name: smoke
            paths: .features-gen/e2e/features/smoke
          - name: auth
            paths: .features-gen/e2e/features/auth
          - name: playback
            paths: .features-gen/e2e/features/playback
          - name: search
            paths: .features-gen/e2e/features/search
          - name: library
            paths: .features-gen/e2e/features/library
          - name: playlists
            paths: .features-gen/e2e/features/playlists
          - name: home
            paths: .features-gen/e2e/features/home
          - name: album
            paths: .features-gen/e2e/features/album
          - name: artist
            paths: .features-gen/e2e/features/artist
          - name: song
            paths: .features-gen/e2e/features/song
          - name: downloads
            paths: .features-gen/e2e/features/downloads
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        timeout-minutes: 5
        # Chromium binary only — ubuntu-latest already ships the shared libs, so
        # we skip --with-deps (its apt step is what intermittently hangs). Retry
        # once on the occasional flaky download.
        run: npx playwright install chromium || npx playwright install chromium

      # Warm up the Jellyfin auth path before the tests. The server sits behind a
      # cloudflared tunnel that goes cold when idle: the FIRST auth after a gap
      # can take 12–15s+ (then it drops to ~0.2s). If that cold hit lands inside
      # a test's sign-in it trips the app's request timeout and the whole area
      # fails — so we absorb it here, in a retrying curl, before Playwright runs.
      - name: Warm up Jellyfin auth
        env:
          VITE_JELLYFIN_URL: ${{ secrets.VITE_JELLYFIN_URL }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: bash scripts/warmup-jellyfin.sh

      # Ensure the cadence-test user owns a playlist + follows an artist — the
      # library/home scenarios need that owned content, which the
      # playlist-ownership fix (own-only Your Library) otherwise leaves empty on
      # a fresh user. Idempotent; never fails the job.
      - name: Seed owned content for this area's user
        env:
          VITE_JELLYFIN_URL: ${{ secrets.VITE_JELLYFIN_URL }}
          # Seed the SAME user this area runs as (dedicated users own no content
          # until seeded) — so 'open the first playlist' / followed-artist
          # scenarios have their fixtures regardless of which user the area uses.
          TEST_USERNAME: ${{ (matrix.area.name == 'downloads' && secrets.TEST_USERNAME_DL) || (matrix.area.name == 'playlists' && secrets.TEST_USERNAME_VIS) || secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: bash scripts/seed-e2e-user.sh

      # Auto-retry the whole area once on failure. Playwright already retries
      # individual scenarios (retries: 2), but when a scenario exhausts all its
      # attempts inside one bad ~60s Jellyfin window (auth throttle / stalled
      # reads under CI load), the job fails. A fresh re-run usually hits a calm
      # window — this automates the manual "re-run the failed job" and ends the
      # flake tail without weakening any assertion.
      - name: Run acceptance tests (${{ matrix.area.name }})
        uses: nick-fields/retry@v4
        env:
          # The server URL is NOT in committed source — Vite reads it from this
          # secret at dev-server start (webServer in playwright.config.ts).
          VITE_JELLYFIN_URL: ${{ secrets.VITE_JELLYFIN_URL }}
          # DEDICATED test user per WRITE-heavy area so concurrent matrix shards
          # don't contend on ONE user's mutable server state (playlists/downloads
          # created+deleted by one area churned the library list another area was
          # reading — the two consistently-failing areas at full parallelism). The
          # read-only areas keep the shared cadence-test user. Password is shared.
          TEST_USERNAME: ${{ (matrix.area.name == 'downloads' && secrets.TEST_USERNAME_DL) || (matrix.area.name == 'playlists' && secrets.TEST_USERNAME_VIS) || secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          # A DISTINCT Jellyfin DeviceId PER AREA. Jellyfin keys a playback session
          # per (user, DeviceId); all areas sign in as the same cadence-test user,
          # so a single shared DeviceId meant concurrent matrix shards collided on
          # ONE server-side session and clobbered each other's session state —
          # areas passed alone but failed together (the real "flake"). Per-area ids
          # give each shard its own session; stable within a run so retries still
          # reuse it (no session pile-up). See app-shell.steps.ts.
          E2E_DEVICE_ID: cadence-e2e-${{ matrix.area.name }}
          # Second user — cross-user playlist-visibility scenario (playlists area).
          # Playlists uses its OWN pair (vis + vis2) so the visibility test's
          # public/private toggling can't collide with the shared users other
          # concurrent areas read. Password shared.
          TEST_USERNAME_2: ${{ matrix.area.name == 'playlists' && secrets.TEST_USERNAME_VIS2 || secrets.TEST_USERNAME_2 }}
          TEST_PASSWORD_2: ${{ secrets.TEST_PASSWORD_2 }}
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 30
          # Re-warm the tunnel/auth INSIDE the retry command so attempt 2 (after
          # the 30s wait, by which point the tunnel may have gone cold again)
          # doesn't start Playwright's sign-in against a cold server — the exact
          # window that made whole areas fail both attempts. Warmup never fails
          # the run; the tests remain the gate.
          command: bash scripts/warmup-jellyfin.sh && npx bddgen && npx playwright test ${{ matrix.area.paths }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ matrix.area.name }}
          path: playwright-report/
          retention-days: 7
