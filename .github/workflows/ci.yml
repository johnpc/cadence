name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The acceptance suite reads/writes against the SHARED live Jellyfin server, so
# serialize runs: one clear→read cycle must finish before the next starts, or a
# concurrent run's writes would corrupt another's reads. Don't cancel in
# progress for the same reason.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: false

jobs:
  quality:
    name: Lint, Test, Coverage, CRAP & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: File-length discipline (max 100 lines)
        run: npm run check:lines

      - name: Feature coverage (every .feature maps to an acceptance area)
        run: npm run check:features

      - name: Unit tests with coverage (80% floor)
        run: npm run test:coverage

      - name: CRAP score analysis (threshold 15)
        run: npm run crap

      - name: Build
        run: npm run build

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  acceptance:
    # One job per feature area, each its own independent check. Splitting isolates
    # a flaky area from the rest. Tests hit the real Jellyfin server (base URL is
    # baked into the build via VITE_JELLYFIN_URL).
    name: Acceptance Tests (${{ matrix.area.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Cap parallelism: all areas hit ONE self-hosted Jellyfin server. Running
      # all ~10 at once stampedes it (auth throttling / stalled reads that read
      # as flakes). 3 keeps the server responsive without slowing CI much.
      max-parallel: 3
      matrix:
        area:
          - name: smoke
            paths: .features-gen/e2e/features/smoke
          - name: auth
            paths: .features-gen/e2e/features/auth
          - name: playback
            paths: .features-gen/e2e/features/playback
          - name: search
            paths: .features-gen/e2e/features/search
          - name: library
            paths: .features-gen/e2e/features/library
          - name: playlists
            paths: .features-gen/e2e/features/playlists
          - name: home
            paths: .features-gen/e2e/features/home
          - name: album
            paths: .features-gen/e2e/features/album
          - name: artist
            paths: .features-gen/e2e/features/artist
          - name: song
            paths: .features-gen/e2e/features/song
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        timeout-minutes: 5
        # Chromium binary only — ubuntu-latest already ships the shared libs, so
        # we skip --with-deps (its apt step is what intermittently hangs). Retry
        # once on the occasional flaky download.
        run: npx playwright install chromium || npx playwright install chromium

      # Auto-retry the whole area once on failure. Playwright already retries
      # individual scenarios (retries: 2), but when a scenario exhausts all its
      # attempts inside one bad ~60s Jellyfin window (auth throttle / stalled
      # reads under CI load), the job fails. A fresh re-run usually hits a calm
      # window — this automates the manual "re-run the failed job" and ends the
      # flake tail without weakening any assertion.
      - name: Run acceptance tests (${{ matrix.area.name }})
        uses: nick-fields/retry@v3
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 30
          command: npx bddgen && npx playwright test ${{ matrix.area.paths }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.area.name }}
          path: playwright-report/
          retention-days: 7
