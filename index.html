<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cadence</title>
    <meta
      name="description"
      content="Cadence — a Spotify-like music client for your self-hosted Jellyfin server."
    />

    <base href="/" />

    <meta name="color-scheme" content="light dark" />
    <!-- Tint the browser/OS chrome (mobile address bar, PWA title bar) to match
         the app's near-black canvas (--cad-bg) so it never flashes white before
         the manifest is parsed. Matches manifest.json's theme_color. -->
    <meta name="theme-color" content="#121212" />
    <!-- Allow pinch-zoom (accessibility): no maximum-scale / user-scalable=no,
         which would block users who need to zoom. viewport-fit=cover is kept for
         iOS notch/safe-area insets. -->
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <link rel="manifest" href="/manifest.json" />

    <link rel="shortcut icon" type="image/png" href="/favicon.png" />

    <!-- add to homescreen for ios -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iOS reads the apple-prefixed flag to launch the installed PWA in
         standalone (no Safari chrome); keep both for cross-browser coverage. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Cadence" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <!-- Social preview when a Cadence link is shared -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Cadence" />
    <meta
      property="og:description"
      content="A Spotify-like music client for your self-hosted Jellyfin server."
    />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Runtime config (window.__CADENCE_CONFIG__), written per-deploy by the
         container entrypoint from env (e.g. SIGNUP_URL). Loaded before the app;
         ships empty by default so nothing is baked into the image. -->
    <script src="/config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
