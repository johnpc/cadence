server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Hashed assets are immutable — cache them hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Runtime config is regenerated per container start from env — never cache it,
  # or a stale SIGNUP_URL (or none) would stick across redeploys.
  location = /config.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  # SPA fallback: every route resolves to the app shell.
  location / {
    try_files $uri /index.html;
  }

  # Slice 9 (Marlin search): a same-origin proxy to the marlin-search Express
  # endpoint on the umbrel LAN, injecting the auth token server-side so it never
  # ships in client JS. Commented out until the search-swap slice lands.
  # location /api/search {
  #   proxy_pass http://marlin-search-indexer:5000/search;
  #   proxy_set_header Authorization "Bearer supersecrettoken";
  # }
}
