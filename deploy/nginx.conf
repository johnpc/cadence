server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Hashed assets are immutable — cache them hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Runtime config is regenerated per container start from env — never cache it,
  # or a stale SIGNUP_URL (or none) would stick across redeploys.
  location = /config.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  # SPA fallback: every route resolves to the app shell.
  location / {
    try_files $uri /index.html;
  }

  # Optional same-origin marlin-search proxy. runtime-config.sh writes this file
  # at container start: EMPTY when MARLIN_URL is unset (native search), or an
  # `/api/search` location that proxies to the indexer and injects the token
  # SERVER-SIDE when MARLIN_URL + MARLIN_TOKEN are set — so the browser sends no
  # token and never touches the indexer directly, and it's same-origin (no CORS,
  # no extra public host, no Cloudflare hostname). Always present so nginx boots
  # whether or not the proxy is configured.
  include /etc/nginx/cadence/marlin.conf;

  # Optional same-origin Lidarr proxy for "request missing music". Same shape as
  # marlin: runtime-config.sh writes this EMPTY unless LIDARR_URL + LIDARR_API_KEY
  # are set, else a curated allowlist of /api/lidarr/* locations that inject the
  # API key SERVER-SIDE (a write credential — never shipped to the browser, and
  # only read/add paths are reachable). Always present so nginx boots regardless.
  include /etc/nginx/cadence/lidarr.conf;
}
